<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rawbioter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="top-bar">
        <img src="assets/icon-expand.png" class="icon left" id="expandBtn">
        <img src="assets/icon-cart.png" class="icon right" id="cartBtn">
    </div>

    <div class="logo-container">
        <img src="assets/logo.png" class="logo">
    </div>

    <div class="filters">
        <img src="assets/icon-music.png" class="filter" data-filter="music">
        <img src="assets/icon-merch.png" class="filter" data-filter="merch">
        <img src="assets/icon-tickets.png" class="filter" data-filter="tickets">
        <img src="assets/icon-all.png" class="filter active" data-filter="all">
    </div>
</header>

<main>
    <div class="product-grid" id="productGrid">

        <!-- Example products -->
        <div class="product" data-category="music">
            <img src="assets/product1.jpg">
            <div class="code">TCK-CD-XXX</div>
        </div>

        <div class="product" data-category="merch">
            <img src="assets/product2.jpg">
            <div class="code">HD-TCK-XXX</div>
        </div>

        <div class="product" data-category="music">
            <img src="assets/product3.jpg">
            <div class="code">DAS-CD-XXX</div>
        </div>

        <!-- Duplicate blocks for up to 36 items -->

    </div>
</main>

<script src="script.js"></script>
</body>
</html>
