<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAWBIOTER</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
    <!-- TOP BAR -->
    <div class="top-bar">
        <img src="assets/icon-expand.png" class="icon left" id="expandBtn" alt="Expand">
        <img src="assets/icon-cart.png" class="icon right" id="cartBtn" alt="Cart">
    </div>

    <!-- LOGO -->
    <div class="logo-container">
        <img src="assets/logo.png" class="logo" alt="Logo">
    </div>

    <!-- ICON ROW -->
    <div class="filters">
        <img src="assets/icon-tickets.png" class="filter" data-filter="tickets" alt="Tickets">
        <img src="assets/icon-merch.png" class="filter" data-filter="merch" alt="Merch">
        <img src="assets/icon-music.png" class="filter" data-filter="music" alt="Music">

        <a href="https://your-support-link.com" target="_blank">
            <img src="assets/icon-thunder.png" class="support" alt="Support">
        </a>
    </div>
</header>

<main>
    <div class="product-grid" id="productGrid">

        <div class="product" data-category="music">
            <img src="assets/product1.jpg" alt="">
            <div class="code">TCK-CD-XXX</div>
        </div>

        <div class="product" data-category="merch">
            <img src="assets/product2.jpg" alt="">
            <div class="code">HD-TCK-XXX</div>
        </div>

        <div class="product" data-category="tickets">
            <img src="assets/product3.jpg" alt="">
            <div class="code">DAS-CD-XXX</div>
        </div>

        <!-- duplicate product blocks as needed -->

    </div>
</main>

<script src="script.js"></script>
</body>
</html>
