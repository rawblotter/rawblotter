<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAWBIOTER</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
    <!-- TOP BAR -->
    <div class="top-bar">
        <img src="assets/icon-expand.png" class="icon left" id="expandBtn" alt="Expand">
        <img src="assets/icon-cart.png" class="icon right" id="cartBtn" alt="Cart">
    </div>

    <!-- LOGO -->
    <div class="logo-container">
        <img src="assets/logo.png" class="logo" alt="Logo">
    </div>

    <!-- ICON ROW -->
    <div class="filters">
        <img src="assets/icon-tickets.png" class="filter" data-filter="tickets" alt="Tickets">
        <img src="assets/icon-merch.png" class="filter" data-filter="merch" alt="Merch">
        <img src="assets/icon-music.png" class="filter" data-filter="music" alt="Music">

        <a href="https://your-support-link.com" target="_blank">
            <img src="assets/icon-thunder.png" class="support" alt="Support">
        </a>
    </div>
</header>

<main>
    <div class="product music" data-name="TCK-CD" data-price="20">
    <img src="assets/tck-cd.png" alt="TCK CD">
    <span>TCK-CD</span>
</div>

<div class="product music" data-name="TCK-DIGITAL" data-price="10">
    <img src="assets/tck-digital.png" alt="TCK Digital Download">
    <span>TCK-DIGITAL</span>
</div>

<div class="product music" data-name="DAS-CD" data-price="20">
    <img src="assets/das-cd.png" alt="DAS CD">
    <span>DAS-CD</span>
</div>

<div class="product music" data-name="DAS-DIGITAL" data-price="10">
    <img src="assets/das-digital.png" alt="DAS Digital Download">
    <span>DAS-DIGITAL</span>
</div>

<div class="product merch" data-name="RAWBLOTTER-OG-SHIRT-BLACK" data-price="40">
    <img src="assets/rawblotter-og-shirt-black.png" alt="Rawblotter OG Shirt Black">
    <span>RAWBLOTTER-OG-SHIRT-BLACK</span>
</div>

<div class="product merch" data-name="RAWBLOTTER-OG-SHIRT-WHITE" data-price="40">
    <img src="assets/rawblotter-og-shirt-white.png" alt="Rawblotter OG Shirt White">
    <span>RAWBLOTTER-OG-SHIRT-WHITE</span>
</div>

        <!-- duplicate product blocks as needed -->

    </div>
</main>

<script src="script.js"></script>
</body>
</html>
