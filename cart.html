<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
    <img src="assets/logo.png" class="logo" alt="Logo">
</header>

<main style="max-width:420px;margin:40px auto;text-align:center;">
    <div style="
        background:#111;
        padding:30px;
        border-radius:6px;
        box-shadow:0 0 30px rgba(0,0,0,0.6);
    ">
        <h3 style="margin-bottom:20px;">RECEIPT</h3>

        <p>Items will appear here</p>

        <button style="
            margin-top:20px;
            background:#B22222;
            border:none;
            padding:14px 40px;
            color:white;
            font-size:14px;
            cursor:pointer;
        ">
            Checkout
        </button>

        <p style="margin-top:20px;">
            <a href="mailto:contact@yourbrand.com" style="color:white;">Contact</a>
        </p>
    </div>
</main>

</body>
</html>
